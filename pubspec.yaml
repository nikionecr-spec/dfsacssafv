name: productivity_app
description: "Aura — a premium, high-performance productivity app (notes, calendar, tasks, focus timer, developer tools)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Fast, offline local database (SQLite)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Jalali (Shamsi) <-> Gregorian date conversion
  shamsi_date: ^1.0.4

  # Markdown live preview rendering
  flutter_markdown: ^0.7.4

  # Local notifications (reminders, persistent Pomodoro controls)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Opt into high refresh rate (90/120 Hz) on supported Android devices
  flutter_displaymode: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
